<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Edit Movie — CineBook</title></head>
<body>
<main>
    <div class="max-w-2xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-white mb-8 border-l-4 border-netflix-red pl-4">
            Edit Movie
        </h1>
        <form th:action="@{/movies/admin/edit/{id}(id=${movie.id})}"
              th:object="${movie}" method="post"
              class="bg-netflix-dark rounded-lg p-8 space-y-5">

            <div>
                <label class="block text-gray-400 text-sm mb-1">Title</label>
                <input type="text" th:field="*{title}"
                       class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Genre</label>
                <select th:field="*{genre}"
                        class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm">
                    <option value="Action">Action</option>
                    <option value="Drama">Drama</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Horror">Horror</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Romance">Romance</option>
                    <option value="Animation">Animation</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Duration (minutes)</label>
                    <input type="number" th:field="*{durationMinutes}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Rating (0-10)</label>
                    <input type="number" step="0.1" th:field="*{rating}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                </div>
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Poster URL</label>
                <input type="text" th:field="*{posterUrl}"
                       class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Description</label>
                <textarea th:field="*{description}" rows="4"
                          class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm resize-none"></textarea>
            </div>

            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="btn-red px-8 py-3 rounded text-white font-semibold">
                    Save Changes
                </button>
                <a href="/movies"
                   class="bg-gray-700 hover:bg-gray-600 px-8 py-3 rounded text-white font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
