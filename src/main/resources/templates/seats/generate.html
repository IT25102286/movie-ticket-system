<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Generate Seats — CineBook</title></head>
<body>
<main>
    <div class="max-w-xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-white mb-8 border-l-4 border-netflix-red pl-4">
            Generate Seat Layout
        </h1>
        <form th:action="@{/seats/admin/generate}" method="post"
              class="bg-netflix-dark rounded-lg p-8 space-y-5">
            <div>
                <label class="block text-gray-400 text-sm mb-1">Screening</label>
                <select name="screeningId"
                        class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm">
                    <option th:each="s : ${screenings}"
                            th:value="${s.id}"
                            th:text="${s.date} + ' ' + ${s.time} + ' — Hall ' + ${s.hall}"></option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Rows</label>
                    <input type="number" name="rows" value="6" min="1" max="8"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                    <p class="text-gray-600 text-xs mt-1">Max 8 rows (A–H)</p>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Columns</label>
                    <input type="number" name="cols" value="10" min="1" max="20"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                    <p class="text-gray-600 text-xs mt-1">Seats per row</p>
                </div>
            </div>
            <div class="bg-netflix-black rounded p-4 text-sm text-gray-400">
                💡 Last 2 rows will automatically be set as <span class="text-yellow-400">VIP seats</span>.
                All other rows are Standard.
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-red px-8 py-3 rounded text-white font-semibold">
                    Generate Seats
                </button>
                <a href="/screenings/admin"
                   class="bg-gray-700 hover:bg-gray-600 px-8 py-3 rounded text-white font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
