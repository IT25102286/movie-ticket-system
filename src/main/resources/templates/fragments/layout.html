<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">CineBook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        netflix: {
                            red: '#E50914',
                            darkred: '#B20710',
                            black: '#141414',
                            dark: '#1F1F1F',
                            card: '#2F2F2F',
                            muted: '#6B7280'
                        }
                    },
                    fontFamily: {
                        netflix: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .nav-link:hover { color: #E50914; transition: color 0.2s; }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #E50914;
            box-shadow: 0 0 0 1px #E50914;
        }
        .btn-red { background-color: #E50914; }
        .btn-red:hover { background-color: #B20710; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #E50914; border-radius: 3px; }

        body.light-theme { background-color: #f8fafc; color: #0f172a; }
        body.light-theme nav { background-color: #ffffff; border-bottom-color: #e2e8f0; }
        body.light-theme footer { border-top-color: #e2e8f0; color: #475569; }
        body.light-theme .bg-netflix-black { background-color: #f8fafc !important; }
        body.light-theme .bg-netflix-dark { background-color: #ffffff !important; }
        body.light-theme .bg-netflix-card { background-color: #f1f5f9 !important; }
        body.light-theme .border-gray-800,
        body.light-theme .border-gray-700 { border-color: #cbd5e1 !important; }
        body.light-theme .text-white { color: #0f172a !important; }
        body.light-theme .text-gray-500,
        body.light-theme .text-gray-400,
        body.light-theme .text-gray-300 { color: #475569 !important; }
        body.light-theme input,
        body.light-theme select,
        body.light-theme textarea {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border-color: #cbd5e1 !important;
        }
        body.light-theme .nav-link { color: #334155; }
        body.light-theme .nav-link:hover { color: #E50914; }
    </style>
</head>
<body class="bg-netflix-black text-white min-h-screen">

<!-- Navbar -->
<nav class="bg-netflix-dark border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="/home" class="text-netflix-red font-bold text-2xl tracking-widest uppercase">
            🎬 CineBook
        </a>
        <div class="flex items-center gap-6 text-sm font-medium text-gray-300">
            <a href="/home" class="nav-link">Home</a>
            <a href="/movies" class="nav-link">Movies</a>
            <div th:if="${session.loggedInUser != null and session.loggedInUser.role != 'ADMIN'}">
                <a href="/bookings/my" class="nav-link">My Bookings</a>
            </div>
            <div th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}"
                 class="flex items-center gap-6">
                <a href="/screenings/admin" class="nav-link">Screenings</a>
                <a href="/seats/admin/generate" class="nav-link">Seats</a>
                <a href="/bookings/admin" class="nav-link">Bookings</a>
                <a href="/admin/users" class="nav-link">Users</a>
                <a href="/payments/admin" class="nav-link">Payments</a>
            </div>
            <button id="themeToggle"
                    type="button"
                    class="px-3 py-1 rounded border border-gray-700 text-xs text-gray-300 hover:text-white hover:border-gray-500">
                Light Mode
            </button>
            <div th:if="${session.loggedInUser == null}">
                <a href="/login"
                   class="btn-red px-4 py-2 rounded text-white text-sm font-semibold">
                    Sign In
                </a>
            </div>
            <div th:if="${session.loggedInUser != null}"
                 class="flex items-center gap-4">
                <a href="/profile" class="nav-link text-gray-300">
                    👤 <span th:text="${session.loggedInUser.name}"></span>
                </a>
                <a href="/logout" class="text-gray-500 hover:text-red-500 text-sm">Logout</a>
            </div>
        </div>
    </div>
</nav>

<!-- Page Content -->
<main th:replace="${content}">
</main>

<footer class="border-t border-gray-800 mt-20 py-10 text-center text-gray-600 text-sm">
    © 2025 CineBook. All rights reserved.
</footer>

<script>
    (function () {
        const STORAGE_KEY = "cinebook-theme";
        const body = document.body;
        const toggle = document.getElementById("themeToggle");

        const setTheme = (theme) => {
            const isLight = theme === "light";
            body.classList.toggle("light-theme", isLight);
            body.classList.toggle("dark-theme", !isLight);
            if (toggle) toggle.textContent = isLight ? "Dark Mode" : "Light Mode";
            localStorage.setItem(STORAGE_KEY, theme);
        };

        const savedTheme = localStorage.getItem(STORAGE_KEY);
        setTheme(savedTheme === "light" ? "light" : "dark");

        if (toggle) {
            toggle.addEventListener("click", function () {
                const currentIsLight = body.classList.contains("light-theme");
                setTheme(currentIsLight ? "dark" : "light");
            });
        }
    })();
</script>

</body>
</html>
