<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>My Payments — CineBook</title></head>
<body>
<main>
    <div class="max-w-5xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-white mb-10 border-l-4 border-netflix-red pl-4">
            My Payment History
        </h1>
        <div class="space-y-4">
            <div th:each="payment : ${payments}"
                 class="bg-netflix-dark border border-gray-800 rounded-lg p-6 flex items-center justify-between">
                <div class="flex gap-10">
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Payment ID</p>
                        <p class="text-white font-bold mt-1" th:text="'#' + ${payment.id}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Booking</p>
                        <p class="text-white mt-1" th:text="'#' + ${payment.bookingId}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Method</p>
                        <p class="text-white mt-1" th:text="${payment.method}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Amount</p>
                        <p class="text-netflix-red font-bold mt-1"
                           th:text="'LKR ' + ${payment.amount}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase">Status</p>
                        <span th:classappend="${payment.status == 'COMPLETED'} ? 'bg-green-800 text-green-300' : 'bg-yellow-800 text-yellow-300'"
                              class="inline-block mt-1 text-xs px-2 py-1 rounded-full"
                              th:text="${payment.status}"></span>
                    </div>
                </div>
                <a th:href="@{/payments/receipt/{id}(id=${payment.bookingId})}"
                   class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-white text-sm">
                    View Receipt
                </a>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(payments)}"
             class="text-center py-24 text-gray-600">
            <p class="text-5xl mb-4">💳</p>
            <p class="text-xl">No payments yet.</p>
        </div>
    </div>
</main>
</body>
</html>
