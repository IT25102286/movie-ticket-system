<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Register — CineBook</title></head>
<body>
<main>
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <h1 class="text-4xl font-black text-white mb-2 text-center">Create Account</h1>
            <p class="text-gray-500 text-center mb-8">Join CineBook today</p>

            <div th:if="${param.error}"
                 class="bg-red-900 border border-netflix-red text-red-200 px-4 py-3 rounded mb-4 text-sm">
                Email already in use. Please use a different email.
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post"
                  class="bg-netflix-dark rounded-lg p-8 space-y-5">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Full Name</label>
                    <input type="text" th:field="*{name}" required
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"
                           placeholder="John Doe"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Email</label>
                    <input type="email" th:field="*{email}" required
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"
                           placeholder="you@email.com"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Phone</label>
                    <input type="tel" th:field="*{phone}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"
                           placeholder="07X XXX XXXX"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Password</label>
                    <input type="password" th:field="*{password}" required
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"
                           placeholder="••••••••"/>
                </div>
                <button type="submit"
                        class="btn-red w-full py-3 rounded text-white font-bold text-base">
                    Create Account
                </button>
            </form>

            <p class="text-center text-gray-600 mt-6 text-sm">
                Already have an account?
                <a href="/login" class="text-white hover:text-netflix-red">Sign in</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
