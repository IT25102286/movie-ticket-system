<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Sign In — CineBook</title></head>
<body>
<main>
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <h1 class="text-4xl font-black text-white mb-2 text-center">Sign In</h1>
            <p class="text-gray-500 text-center mb-8">Welcome back to CineBook</p>

            <div th:if="${param.error}"
                 class="bg-red-900 border border-netflix-red text-red-200 px-4 py-3 rounded mb-4 text-sm">
                Invalid email or password. Please try again.
            </div>

            <form th:action="@{/login}" method="post"
                  class="bg-netflix-dark rounded-lg p-8 space-y-5">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Email</label>
                    <input type="email" name="email" required
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"
                           placeholder="you@email.com"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"
                           placeholder="••••••••"/>
                </div>
                <button type="submit"
                        class="btn-red w-full py-3 rounded text-white font-bold text-base">
                    Sign In
                </button>
            </form>

            <p class="text-center text-gray-600 mt-6 text-sm">
                New to CineBook?
                <a href="/register" class="text-white hover:text-netflix-red">Sign up now</a>
            </p>
        </div>
    </div>
</main>
</body>
</html>
