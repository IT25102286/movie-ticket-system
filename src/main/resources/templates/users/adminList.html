<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Users — CineBook Admin</title></head>
<body>
<main>
    <div class="max-w-6xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-white mb-10 border-l-4 border-netflix-red pl-4">
            All Users
        </h1>
        <div class="bg-netflix-dark rounded-lg overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-netflix-card text-gray-400 uppercase text-xs tracking-wider">
                <tr>
                    <th class="px-6 py-4 text-left">ID</th>
                    <th class="px-6 py-4 text-left">Name</th>
                    <th class="px-6 py-4 text-left">Email</th>
                    <th class="px-6 py-4 text-left">Phone</th>
                    <th class="px-6 py-4 text-left">Role</th>
                    <th class="px-6 py-4 text-left">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user, iter : ${users}"
                    th:classappend="${iter.odd} ? 'bg-netflix-black' : 'bg-netflix-dark'"
                    class="border-t border-gray-800 hover:bg-netflix-card transition-colors">
                    <td class="px-6 py-4 text-gray-500" th:text="${user.id}"></td>
                    <td class="px-6 py-4 text-white font-medium" th:text="${user.name}"></td>
                    <td class="px-6 py-4 text-gray-300" th:text="${user.email}"></td>
                    <td class="px-6 py-4 text-gray-300" th:text="${user.phone}"></td>
                    <td class="px-6 py-4">
                        <span th:classappend="${user.role == 'ADMIN'} ? 'bg-netflix-red' : 'bg-gray-700'"
                              class="text-white text-xs px-2 py-1 rounded-full"
                              th:text="${user.role}"></span>
                    </td>
                    <td class="px-6 py-4">
                        <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post">
                            <button type="submit"
                                    onclick="return confirm('Delete this user?')"
                                    class="bg-netflix-red hover:bg-netflix-darkred px-3 py-1 rounded text-white text-xs">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
