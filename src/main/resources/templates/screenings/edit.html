<!-- screenings/edit.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Edit Screening — CineBook</title></head>
<body>
<main>
    <div class="max-w-2xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-white mb-8 border-l-4 border-netflix-red pl-4">
            Edit Screening
        </h1>
        <form th:action="@{/screenings/admin/edit/{id}(id=${screening.id})}"
              th:object="${screening}" method="post"
              class="bg-netflix-dark rounded-lg p-8 space-y-5">
            <div>
                <label class="block text-gray-400 text-sm mb-1">Movie</label>
                <select th:field="*{movieId}"
                        class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm">
                    <option th:each="movie : ${movies}"
                            th:value="${movie.id}"
                            th:text="${movie.title}"></option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Date</label>
                    <input type="date" th:field="*{date}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Time</label>
                    <input type="time" th:field="*{time}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                </div>
            </div>
            <div>
                <label class="block text-gray-400 text-sm mb-1">Hall</label>
                <input type="text" th:field="*{hall}"
                       class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Total Seats</label>
                    <input type="number" th:field="*{totalSeats}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                </div>
                <div>
                    <label class="block text-gray-400 text-sm mb-1">Ticket Price (LKR)</label>
                    <input type="number" step="0.01" th:field="*{ticketPrice}"
                           class="w-full bg-netflix-card border border-gray-700 rounded px-4 py-3 text-white text-sm"/>
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="btn-red px-8 py-3 rounded text-white font-semibold">
                    Save Changes
                </button>
                <a href="/screenings/admin"
                   class="bg-gray-700 hover:bg-gray-600 px-8 py-3 rounded text-white font-semibold">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
