<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head><title>Showtimes — CineBook</title></head>
<body>
<main>
    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-3xl font-bold text-white mb-2 border-l-4 border-netflix-red pl-4">
            Showtimes
        </h1>
        <p class="text-gray-400 mb-8 pl-5"
           th:text="${movie.title}"></p>

        <div class="space-y-4">
            <div th:each="screening : ${screenings}"
                 class="bg-netflix-dark border border-gray-800 rounded-lg p-6 flex items-center justify-between hover:border-netflix-red transition-colors">
                <div class="flex gap-8">
                    <div>
                        <p class="text-gray-500 text-xs uppercase tracking-wide">Date</p>
                        <p class="text-white font-semibold mt-1" th:text="${screening.date}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase tracking-wide">Time</p>
                        <p class="text-white font-semibold mt-1" th:text="${screening.time}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase tracking-wide">Hall</p>
                        <p class="text-white font-semibold mt-1" th:text="${screening.hall}"></p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase tracking-wide">Price</p>
                        <p class="text-netflix-red font-bold mt-1"
                           th:text="'LKR ' + ${screening.ticketPrice}"></p>
                    </div>
                </div>
                <a th:href="@{/seats/screening/{id}(id=${screening.id})}"
                   class="btn-red px-6 py-3 rounded text-white font-semibold text-sm">
                    Select Seats
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(screenings)}"
             class="text-center py-20 text-gray-600">
            <p class="text-4xl mb-3">📅</p>
            <p>No screenings available for this movie.</p>
        </div>
    </div>
</main>
</body>
</html>
